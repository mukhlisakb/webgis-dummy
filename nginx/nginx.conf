server {
    listen 80;
    server_name wetland-gis.mukhlis.tech;

    # 1. Reverse proxy untuk halaman utama
    location / {
        proxy_pass http://webgis:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Reverse proxy khusus untuk static assets (JS, CSS)
    location /assets/ {
        proxy_pass http://webgis:3000/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Cache assets untuk performa yang lebih baik
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Optional: Gzip compression to make loading faster
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
